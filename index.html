<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Vehicle Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">🚗 Live Vehicle Streaming</h1>

    <!-- সার্চ ও ডিভাইস সিলেক্ট -->
    <div class="bg-gray-800 p-6 rounded-xl mb-6">
      <div class="flex flex-col gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Search Vehicle</label>
          <input type="text" id="searchInput" placeholder="IMEI or name..." 
                 class="w-full p-3 bg-gray-700 border border-gray-600 rounded"
                 oninput="filterDevices()">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Select Vehicle</label>
          <select id="deviceSelect" class="w-full p-3 bg-gray-700 border border-gray-600 rounded">
            <option value="">-- Select --</option>
          </select>
        </div>
        <button onclick="openLive()" class="w-full py-3 bg-green-600 rounded hover:bg-green-700 text-lg font-semibold">
          🔴 Watch Live
        </button>
      </div>
    </div>

    <!-- স্ট্যাটাস মেসেজ -->
    <div id="status" class="text-center text-gray-400"></div>
  </div>

  <script>
    let allDevices = [];

    // ডিভাইস লোড
    async function loadAllDevices() {
      try {
        const res = await fetch('/api/devices');
        const data = await res.json();
        if (data.code === 0) {
          allDevices = data.result;
          populateSelect();
        }
      } catch(e) { console.error(e); }
    }

    function populateSelect(filter = '') {
      const select = document.getElementById('deviceSelect');
      select.innerHTML = '<option value="">-- Select --</option>';
      const lowerFilter = filter.toLowerCase();
      allDevices.forEach(d => {
        if (filter && !d.imei.toLowerCase().includes(lowerFilter) && 
            !(d.deviceName && d.deviceName.toLowerCase().includes(lowerFilter))) return;
        const opt = document.createElement('option');
        opt.value = d.imei;
        opt.textContent = `${d.deviceName || d.imei} (${d.imei})`;
        select.appendChild(opt);
      });
    }

    function filterDevices() {
      const search = document.getElementById('searchInput').value;
      populateSelect(search);
    }

    // লাইভ স্ট্রিম ওপেন
    async function openLive() {
      const imei = document.getElementById('deviceSelect').value;
      if (!imei) return alert('Please select a vehicle');
      
      const status = document.getElementById('status');
      status.textContent = 'Fetching live stream URL...';
      
      try {
        const res = await fetch(`/api/live?imei=${imei}`);
        const data = await res.json();
        if (data.code !== 0) {
          status.textContent = 'Error: ' + (data.message || 'Unknown error');
          return;
        }
        if (data.result && data.result.UrlCamera) {
          // সরাসরি লাইভ ভিডিও পেজ নতুন ট্যাবে খুলুন
          window.open(data.result.UrlCamera, '_blank');
          status.textContent = 'Live stream opened in new tab.';
        } else {
          status.textContent = 'Live streaming not available for this device.';
        }
      } catch(e) {
        status.textContent = 'Network error. Please try again.';
      }
    }

    loadAllDevices();
  </script>
</body>
</html>
