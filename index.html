<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Vehicle Viewer (Direct Stream)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">🚗 Live Vehicle Streaming</h1>

    <div class="bg-gray-800 p-6 rounded-xl mb-6">
      <div class="flex flex-col gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Search Vehicle</label>
          <input type="text" id="searchInput" placeholder="IMEI or name..." 
                 class="w-full p-3 bg-gray-700 border border-gray-600 rounded"
                 oninput="filterDevices()">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Select Vehicle</label>
          <select id="deviceSelect" class="w-full p-3 bg-gray-700 border border-gray-600 rounded">
            <option value="">-- Select --</option>
          </select>
        </div>
        <button onclick="startLive()" class="w-full py-3 bg-green-600 rounded hover:bg-green-700 text-lg font-semibold">
          ▶️ Watch Live
        </button>
      </div>
    </div>

    <!-- ভিডিও প্লেয়ার -->
    <div id="playerContainer" class="hidden">
      <div class="bg-black rounded-xl overflow-hidden">
        <video id="videoElement" class="w-full" controls autoplay playsinline muted></video>
      </div>
      <p class="text-center text-sm text-gray-400 mt-2">Live stream – device must be online.</p>
    </div>

    <div id="status" class="text-center text-gray-400 mt-4"></div>
  </div>

  <script>
    let allDevices = [];
    let flvPlayer = null;

    async function loadAllDevices() {
      try {
        const res = await fetch('/api/devices');
        const data = await res.json();
        if (data.code === 0) {
          allDevices = data.result;
          populateSelect();
        }
      } catch(e) { console.error(e); }
    }

    function populateSelect(filter = '') {
      const select = document.getElementById('deviceSelect');
      select.innerHTML = '<option value="">-- Select --</option>';
      const lowerFilter = filter.toLowerCase();
      allDevices.forEach(d => {
        if (filter && !d.imei.toLowerCase().includes(lowerFilter) && 
            !(d.deviceName && d.deviceName.toLowerCase().includes(lowerFilter))) return;
        const opt = document.createElement('option');
        opt.value = d.imei;
        opt.textContent = `${d.deviceName || d.imei} (${d.imei})`;
        select.appendChild(opt);
      });
    }

    function filterDevices() {
      const search = document.getElementById('searchInput').value;
      populateSelect(search);
    }

    async function startLive() {
      const imei = document.getElementById('deviceSelect').value;
      if (!imei) return alert('Please select a vehicle');

      // Destroy previous player
      if (flvPlayer) {
        flvPlayer.destroy();
        flvPlayer = null;
      }

      const status = document.getElementById('status');
      const container = document.getElementById('playerContainer');
      const video = document.getElementById('videoElement');

      status.textContent = 'Fetching stream info...';
      container.classList.add('hidden');

      try {
        const res = await fetch(`/api/stream-url?imei=${imei}`);
        const data = await res.json();
        if (data.error) {
          status.textContent = 'Error: ' + data.error;
          return;
        }

        // Expecting data.stream to contain the WebSocket URL
        const streamInfo = data.stream;
        // The internal API likely returns a url like "ws://.../0/imei.flv?token=..."
        // but wrapped in a JSON object. We need to extract it.
        let wsUrl = streamInfo.url || streamInfo.wsUrl || streamInfo.data;
        if (!wsUrl) {
          status.textContent = 'Could not extract WebSocket URL.';
          console.log('streamInfo:', streamInfo);
          return;
        }

        // Check if flv.js is supported
        if (flvjs.isSupported()) {
          flvPlayer = flvjs.createPlayer({
            type: 'flv',
            url: wsUrl,
            isLive: true
          });
          flvPlayer.attachMediaElement(video);
          flvPlayer.load();
          flvPlayer.play();
          container.classList.remove('hidden');
          status.textContent = 'Streaming live...';
        } else {
          status.textContent = 'Your browser does not support FLV playback.';
        }
      } catch (err) {
        status.textContent = 'Network error.';
        console.error(err);
      }
    }

    loadAllDevices();
  </script>
</body>
</html>
